<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detection Tool</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <h1>Detection Tool</h1>
    <p class="status">The extension is currently active.</p>

    <div id="current-url-display" class="status">Current URL: Loading...</div>

    <input type="text" id="custom-url" placeholder="Or manually enter a URL" />

    <button id="add-whitelist">Add to Whitelist</button>
    <button id="add-blacklist">Add to Blacklist</button>
    <button id="view-logs">View Threat Logs</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
